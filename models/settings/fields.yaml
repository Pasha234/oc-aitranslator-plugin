# ===================================
#  Field Definitions
# ===================================

tabs:
    fields:
        anthropic_api_key:
            label: Claude API Key
            span: left

        claude_max_tokens:
            label: Claude Max Tokens
            type: number
            span: right
            default: 16000
            comment: "Maximum response tokens for Claude translations."

        default_driver:
            label: Default Driver
            type: dropdown
            span: left
            comment: "Select the default translation driver."
            options: getDefaultDriverOptions

        default_prompt_id:
            label: Default Prompt
            type: dropdown
            span: left
            comment: "Select the default prompt for translations."
            options: getDefaultPromptOptions
